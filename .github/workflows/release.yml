name: Release

on:
  push:
    tags: ["v*"]
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Canonical `release` gate (Odysseus CI naming convention,
  # docs/ci-naming-convention.md). On main push / PR this runs the release
  # machinery in DRY-RUN mode: it validates that the current manifest version
  # has a matching dated CHANGELOG section and that release notes can be
  # extracted, but publishes nothing. The actual publish path is the
  # tag-triggered `publish` job below. This job emits the canonical check-run
  # `release` that the Ecosystem CI Status board's release column targets.
  release:
    name: release
    if: github.ref_type != 'tag'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Resolve version from manifests (no tag context)
        id: dryver
        run: |
          set -euo pipefail
          version=$(grep -E '^version[[:space:]]*=' pixi.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$version" ]; then
            echo "::error::Could not resolve version from pixi.toml"; exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: ${version}"

      - name: Verify manifests agree (pixi.toml / dagger/package.json / CHANGELOG)
        run: bash tests/version-consistency.test.sh

      - name: Dry-run release notes extraction (no publish)
        env:
          VERSION: ${{ steps.dryver.outputs.version }}
        run: |
          set -euo pipefail
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\] - " { capture=1; next }
            capture && /^## \[/ { exit }
            capture && /^\[[^]]*\]: / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG section found for version ${VERSION}"
            exit 1
          fi
          echo "DRY-RUN OK: would release v${VERSION} with $(wc -l < release-notes.md) line(s) of notes. Nothing published."

  publish:
    name: Publish GitHub Release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Parse and validate tag format (strict semver only)
        id: ver
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$tag' is not strict semver vX.Y.Z. Pre-release and build suffixes are not supported."
            exit 1
          fi
          version="${tag#v}"
          echo "tag=${tag}"        >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify tag version matches manifests
        run: |
          set -euo pipefail
          want="${{ steps.ver.outputs.version }}"
          pixi_v=$(grep -E '^version[[:space:]]*=' pixi.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          dagger_v=$(grep -E '"version"[[:space:]]*:' dagger/package.json | head -1 | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')
          if [ "$pixi_v" != "$want" ] || [ "$dagger_v" != "$want" ]; then
            echo "::error::Tag $want does not match manifests (pixi=$pixi_v, dagger=$dagger_v). Bump manifests before tagging."
            exit 1
          fi
          echo "OK: tag $want matches both manifests"

      - name: Verify CHANGELOG has matching section
        run: bash tests/version-consistency.test.sh

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\] - " { capture=1; next }
            capture && /^## \[/ { exit }
            capture && /^\[[^]]*\]: / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG section found for version ${version}"
            exit 1
          fi
          echo "Extracted $(wc -l < release-notes.md) line(s) of release notes"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "ProjectProteus ${{ steps.ver.outputs.tag }}" \
            --notes-file release-notes.md \
            --verify-tag
