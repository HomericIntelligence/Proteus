# CI workflow for Proteus
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # NOTE: a separate `validate` job that ran `pixi run just validate`
  # previously lived here. It duplicated the `unit-tests` /
  # `integration-tests` jobs in `_required.yml`, which already YAML-parse
  # every pipeline config and verify references to workflow names.
  # Closes #106. If a richer schema validation step is reintroduced,
  # prefer extending `_required.yml` (single source of truth) rather than
  # splitting validation across two workflows.

  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # v2.0.0
        with:
          scandir: "./scripts"

      - name: Verify issue #92 invariants
        run: bash scripts/verify-issue-92-invariants.sh

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dagger/package-lock.json

      - name: Install dependencies
        run: cd dagger && npm ci

      - name: TypeScript type check
        run: cd dagger && npx tsc --noEmit

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Dagger unit + integration tests (tag arithmetic)
        run: cd dagger && npm test
