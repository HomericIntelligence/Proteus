name: Promote Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: "Image name (e.g. myapp)"
        required: true
        type: string
      source_tag:
        description: "Source tag (e.g. staging)"
        required: true
        default: "staging"
        type: string
      dest_tag:
        description: "Destination tag (e.g. latest)"
        required: true
        default: "latest"
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: promote-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote:
    name: Promote Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Log in to registry
        # GITHUB_TOKEN has packages: write permission (set above) — no PAT needed for GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "${GITHUB_TOKEN}" | skopeo login ghcr.io \
            --username "${ACTOR}" \
            --password-stdin

      - name: Promote image
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          DEST_TAG: ${{ inputs.dest_tag }}
          REGISTRY: ghcr.io/homeric-intelligence
        run: |
          ./scripts/promote-image.sh \
            "${REGISTRY}/${IMAGE_NAME}:${SOURCE_TAG}" \
            "${REGISTRY}/${IMAGE_NAME}:${DEST_TAG}"
